<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BayarCoy - Platform Pembayaran Multi-Layanan</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- QRCode.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <!-- jsPDF CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top glass-navbar" id="mainNav">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#dashboard">
                <i class="fas fa-wallet text-success me-2"></i> BayarCoy
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#dashboard" data-page="dashboard">
                            <i class="fas fa-home me-1"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#bayar-tagihan" data-page="bayar-tagihan">
                            <i class="fas fa-file-invoice me-1"></i> Bayar Tagihan
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#spp" data-page="spp">
                            <i class="fas fa-graduation-cap me-1"></i> SPP
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#pulsa" data-page="pulsa">
                            <i class="fas fa-mobile-alt me-1"></i> Pulsa & Paket Data
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#riwayat" data-page="riwayat">
                            <i class="fas fa-history me-1"></i> Riwayat
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#faq" data-page="faq">
                            <i class="fas fa-question-circle me-1"></i> FAQ
                        </a>
                    </li>
                </ul>
                <button class="btn btn-dark-mode ms-3" id="darkModeToggle" aria-label="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="mainContent" class="container mt-5 pt-5">
        <!-- Pages will be rendered here -->
        <div id="pageContent"></div>
    </main>

    <!-- Toast Notification Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <!-- Floating Chat Button -->
    <button class="btn btn-chat-floating" id="chatButton" aria-label="Chat Support">
        <i class="fas fa-comment-dots"></i>
    </button>

    <!-- Back to Top -->
    <button class="btn btn-back-top" id="backToTop" aria-label="Back to top">
        <i class="fas fa-chevron-up"></i>
    </button>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JavaScript -->
    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/payment.js"></script>
    <script src="js/history.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
